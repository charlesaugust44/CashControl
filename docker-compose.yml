services:
  cashcontrol:
    build: .
    container_name: cashcontrol
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "8443:443"
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
      - ./storage:/var/www/html/storage
      - ./database/database.sqlite:/var/www/html/database/database.sqlite
      - ./.env:/var/www/html/.env:ro
